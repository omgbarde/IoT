services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MOSQUITTO_PORT:-1884}:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  node-red:
    image: nodered/node-red:latest
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - "${NODERED_PORT:-1880}:1880"
    environment:
      - TZ=Europe/Rome
      - FLOWS=flows.json
      - THINGSPEAK_WRITE_API_KEY=${THINGSPEAK_WRITE_API_KEY}
    volumes:
      - ./node-red:/data
      - ..:/workspace/challenge3
